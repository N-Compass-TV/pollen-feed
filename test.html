<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollen Sense - Top 5 Peak Misery Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="logo-and-date">
        <img src="assets/pollen3.png" class="logo" alt="pollen-sense-logo">
        <p class="date-display" id="dateDisplay">Loading date...</p>
    </div>

    <div id="container">
        <div class="content-wrapper">

                    ensure accuracy and make necessary adjustments.

        </div>

    <script type="module" src="js/pollen-feed.js"></script>
